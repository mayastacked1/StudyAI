<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyAI | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        // ChatGPT-like colors
                        gpt: {
                            bg: '#ffffff',
                            sidebar: '#202123',
                            input: '#ffffff',
                            inputDark: '#40414f',
                            textMain: '#343541',
                            textDark: '#ececf1',
                            border: '#e5e5e5',
                            borderDark: '#565869'
                        }
                    },
                    fontFamily: {
                        sans: ['Söhne', 'ui-sans-serif', 'system-ui', '-apple-system', 'Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'gpt': '0 0 15px rgba(0,0,0,0.1)',
                        'gpt-dark': '0 0 15px rgba(0,0,0,0.3)',
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        /* Hide Scrollbar but allow scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Markdown Styling - Clean */
        .prose-content { line-height: 1.6; color: inherit; }
        .prose-content p { margin-bottom: 1rem; }
        .prose-content ul { list-style-type: disc; padding-left: 1.2rem; margin-bottom: 1rem; }
        .prose-content ol { list-style-type: decimal; padding-left: 1.2rem; margin-bottom: 1rem; }
        .prose-content li { margin-bottom: 0.4rem; }
        .prose-content code { 
            font-family: 'Menlo', monospace; background: rgba(0,0,0,0.1); 
            color: #eb5757; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em;
        }
        .dark .prose-content code { background: rgba(255,255,255,0.15); color: #ff6b6b; }
        .prose-content pre { 
            background: #000; color: #fff; padding: 1rem; border-radius: 0.5rem; 
            overflow-x: auto; margin-bottom: 1rem; 
        }
        .prose-content pre code { background: transparent; color: inherit; padding: 0; }
        .prose-content h1, .prose-content h2, .prose-content h3 { font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        
        /* Cursor blink for streaming */
        .cursor-blink::after {
            content: '▋';
            display: inline-block;
            vertical-align: middle;
            animation: blink 1s step-start infinite;
            color: currentColor;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="h-full bg-gpt-bg dark:bg-[#343541] text-gpt-textMain dark:text-gpt-textDark transition-colors duration-200 overflow-hidden">

    <div class="flex h-full w-full relative">
        
        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity opacity-0 backdrop-blur-sm"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="absolute md:relative z-30 h-full w-[260px] bg-white dark:bg-[#202123] border-r border-black/10 dark:border-white/10 transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out flex flex-col">
            <!-- New Chat Button -->
            <div class="p-3">
                <button onclick="createNewChat()" class="w-full flex items-center gap-2 px-3 py-3 border border-black/10 dark:border-white/10 rounded-lg hover:bg-gray-100 dark:hover:bg-[#2A2B32] transition-colors text-sm text-left">
                    <svg class="w-4 h-4 text-black dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    <span class="font-medium text-black dark:text-white">New chat</span>
                </button>
            </div>

            <!-- History -->
            <div class="flex-1 overflow-y-auto overflow-x-hidden px-3">
                <div class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-4 mb-2 px-3">Today</div>
                <div id="history-list" class="space-y-1"></div>
            </div>

            <!-- User Profile -->
            <div class="p-3 border-t border-black/10 dark:border-white/10">
                <div class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-[#2A2B32] cursor-pointer">
                    <div class="w-8 h-8 rounded-full bg-brand-600 flex items-center justify-center text-white text-xs font-bold">U</div>
                    <div class="flex-1">
                        <p class="text-sm font-medium text-black dark:text-white">User</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative w-full h-full bg-gpt-bg dark:bg-[#343541]">
            
            <!-- Top Logo Area -->
            <div class="absolute top-0 left-0 right-0 p-4 z-10 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <button onclick="toggleSidebar()" class="md:hidden p-1 text-gray-500 dark:text-gray-400">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <h1 class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-2">
                        StudyAI <span class="text-xs font-normal px-2 py-0.5 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300">GPT-4</span>
                    </h1>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-white transition-colors">
                    <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    <svg class="w-5 h-5 hidden dark:block text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                </button>
            </div>
            
            <!-- Chat Container -->
            <div id="messages" class="flex-1 h-full overflow-y-auto pt-20 pb-32 scroll-smooth">
                <div id="welcome-state" class="flex flex-col items-center justify-center h-[80vh] text-center px-4">
                    <div class="bg-white dark:bg-transparent p-4 rounded-full mb-6 shadow-sm">
                        <svg class="w-10 h-10 text-gray-900 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <h2 class="text-2xl font-semibold text-gray-900 dark:text-white mb-8">How can I help you today?</h2>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 p-4 pb-8 bg-gradient-to-t from-gpt-bg via-gpt-bg to-transparent dark:from-[#343541] dark:via-[#343541]">
                <div class="max-w-3xl mx-auto w-full relative group">
                    <div class="absolute inset-0 bg-gradient-to-r from-blue-500 to-purple-500 rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
                    <div class="relative bg-white dark:bg-[#40414f] rounded-xl shadow-gpt dark:shadow-gpt-dark border border-black/10 dark:border-white/10 overflow-hidden">
                        <input type="file" id="file-input" class="hidden">
                        
                        <textarea id="user-input" rows="1" placeholder="Message StudyAI..." 
                            class="w-full bg-transparent px-12 py-3 outline-none resize-none max-h-48 text-gray-900 dark:text-white placeholder-gray-500 scrollbar-hide text-base"
                            oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                        
                        <div class="flex items-center justify-between px-2 pb-2">
                            <div class="flex items-center pl-1">
                                <button onclick="document.getElementById('file-input').click()" class="p-1.5 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-md transition-colors">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                                </button>
                                <div id="file-name" class="hidden text-xs text-brand-600 font-medium px-2 truncate max-w-[100px]">
                                    file.txt
                                </div>
                            </div>

                            <button id="send-btn" onclick="handleSend()" class="p-1.5 bg-brand-600 hover:bg-brand-500 text-white rounded-md transition-all disabled:opacity-40 disabled:cursor-not-allowed">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="text-center mt-2">
                        <p class="text-[10px] text-gray-400">StudyAI can make mistakes. Consider checking important information.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let conversationHistory = [];
        let currentChatId = Date.now().toString();
        let attachedFile = null;
        const chats = JSON.parse(localStorage.getItem('studyai_chats')) || {};

        // Initialize
        if (Object.keys(chats).length > 0) {
            const lastId = Object.keys(chats)[Object.keys(chats).length - 1];
            loadChat(lastId);
        } else {
            renderHistoryList();
        }

        // --- HELPER: Short Title Generator ---
        function getShortTitle(text) {
            if (!text) return "New Chat";
            // Replace newlines with spaces, trim, split by spaces
            const words = text.replace(/[\n\r]/g, ' ').trim().split(/\s+/);
            // Take first 3 words
            const shortText = words.slice(0, 3).join(' ');
            // Add ellipsis if there were more words
            return words.length > 3 ? shortText + '...' : shortText;
        }

        // --- FILE HANDLING ---
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                attachedFile = e.target.files[0];
                fileNameDisplay.textContent = attachedFile.name;
                fileNameDisplay.classList.remove('hidden');
            } else {
                attachedFile = null;
                fileNameDisplay.classList.add('hidden');
            }
        });

        function saveCurrentChat() {
            if (conversationHistory.length === 0) return;
            chats[currentChatId] = {
                id: currentChatId,
                title: chats[currentChatId]?.title || "New Chat",
                history: conversationHistory,
                timestamp: Date.now()
            };
            localStorage.setItem('studyai_chats', JSON.stringify(chats));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const btn = document.createElement('button');
                const isActive = chat.id === currentChatId;
                btn.className = `flex-1 text-left px-3 py-2 rounded-lg text-sm transition-colors truncate flex items-center justify-between group ${
                    isActive 
                    ? 'bg-gray-200 dark:bg-[#2A2B32] text-gray-900 dark:text-white' 
                    : 'text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-[#2A2B32]'
                }`;
                
                const textSpan = document.createElement('span');
                textSpan.className = "truncate";
                textSpan.textContent = chat.title;
                btn.appendChild(textSpan);

                // Delete Button
                const delIcon = document.createElement('span');
                delIcon.innerHTML = '&times;';
                delIcon.className = "text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 px-2 text-lg font-light";
                delIcon.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                };
                btn.appendChild(delIcon);

                btn.onclick = () => loadChat(chat.id);
                list.appendChild(btn);
            });
        }

        function deleteChat(id) {
            if(confirm('Delete this conversation?')) {
                delete chats[id];
                localStorage.setItem('studyai_chats', JSON.stringify(chats));
                if (id === currentChatId) createNewChat();
                else renderHistoryList();
            }
        }

        async function generateTitle(firstPrompt) {
            // In a real app, this calls an API. Here we simulate a smarter short title
            // or just force the short title logic immediately for better UX in this demo.
            
            // Simulating a tiny delay for "AI thinking"
            setTimeout(() => {
                if(chats[currentChatId]) {
                    // If you had a real API, you would use that response here.
                    // For now, we ensure the title is short using our helper.
                    chats[currentChatId].title = getShortTitle(firstPrompt);
                    localStorage.setItem('studyai_chats', JSON.stringify(chats));
                    renderHistoryList();
                }
            }, 500);
        }

        function loadChat(id) {
            currentChatId = id;
            conversationHistory = chats[id].history || [];
            const chatContainer = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';
            
            chatContainer.innerHTML = ''; 
            
            conversationHistory.forEach(msg => {
                createMessageElement(msg.role, msg.content, false);
            });
            
            renderHistoryList();
            requestAnimationFrame(() => {
                 setTimeout(() => { chatContainer.scrollTop = chatContainer.scrollHeight; }, 50);
            });
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function createNewChat() { 
            currentChatId = Date.now().toString();
            conversationHistory = [];
            const chatContainer = document.getElementById('messages');
            chatContainer.innerHTML = `
                <div id="welcome-state" class="flex flex-col items-center justify-center h-[80vh] text-center px-4">
                    <div class="bg-white dark:bg-transparent p-4 rounded-full mb-6 shadow-sm">
                        <svg class="w-10 h-10 text-gray-900 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <h2 class="text-2xl font-semibold text-gray-900 dark:text-white mb-8">How can I help you today?</h2>
                </div>`;
            renderHistoryList();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function toggleSidebar(forceState) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            const shouldShow = forceState !== undefined ? forceState : isHidden;

            if (shouldShow) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                document.body.style.overflow = 'hidden';
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.style.overflow = '';
            }
        }

        function createMessageElement(role, text = '', isStreaming = false) {
            const chat = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';

            const wrapper = document.createElement('div');
            wrapper.className = `w-full text-gray-800 dark:text-gray-100 border-b border-black/5 dark:border-white/5 py-6 ${role === 'user' ? 'bg-white dark:bg-[#444654]' : ''}`;
            
            const inner = document.createElement('div');
            inner.className = `flex gap-4 md:gap-6 max-w-3xl mx-auto px-4 ${role === 'user' ? 'flex-row-reverse' : 'flex-row'}`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center ${
                role === 'user' 
                ? 'bg-brand-600 text-white mt-1' 
                : 'bg-emerald-600 text-white'
            }`;
            avatar.innerHTML = role === 'user' ? 'U' : 'AI';

            const bubble = document.createElement('div');
            bubble.className = `prose-content leading-7 text-[15px] w-full overflow-hidden ${isStreaming ? 'cursor-blink' : ''}`;

            if (!isStreaming) {
                bubble.innerHTML = DOMPurify.sanitize(marked.parse(text));
            }

            inner.appendChild(avatar);
            inner.appendChild(bubble);
            wrapper.appendChild(inner);
            chat.appendChild(wrapper);
            
            requestAnimationFrame(() => {
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'auto' });
            });
            
            return { wrapper, bubble };
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            let text = input.value.trim();
            
            if (!text && !attachedFile) return;

            // Handle File Reading
            if (attachedFile) {
                try {
                    const content = await readFileAsText(attachedFile);
                    text = `[Attached File: ${attachedFile.name}]\n\n${content}\n\n${text}`;
                } catch (err) {
                    console.error("Error reading file:", err);
                    text = `[Attached File: ${attachedFile.name} (Could not read content)]\n\n${text}`;
                }
                attachedFile = null;
                fileInput.value = '';
                fileNameDisplay.classList.add('hidden');
            }

            // --- REVISED: Create Chat with SHORT title immediately ---
            if (!chats[currentChatId]) {
                chats[currentChatId] = { 
                    id: currentChatId, 
                    // Use the new short title helper here
                    title: getShortTitle(text), 
                    history: [], 
                    timestamp: Date.now() 
                };
                renderHistoryList();
            }

            createMessageElement('user', text);
            conversationHistory.push({ role: 'user', content: text });
            saveCurrentChat();

            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;

            const { bubble } = createMessageElement('assistant', '', true);
            let aiResponseText = '';
            const chat = document.getElementById('messages');

            try {
                // SIMULATING API RESPONSE (Since this is a static file)
                // In a real app, this would be: fetch('/api/chat', ...)
                
                // Simulating network delay
                await new Promise(r => setTimeout(r, 600));
                
                // Simulated response based on input (Mock AI)
                let mockResponse = "I am a frontend demo. In a real application, I would process your request: \"" + getShortTitle(text) + "\" via an API backend.";
                
                // Mock streaming effect
                const chunks = mockResponse.split(' ');
                for (let word of chunks) {
                    await new Promise(r => setTimeout(r, 50)); // Typing speed
                    aiResponseText += word + " ";
                    bubble.textContent = aiResponseText;
                    chat.scrollTop = chat.scrollHeight;
                }

                bubble.classList.remove('cursor-blink');
                conversationHistory.push({ role: 'assistant', content: aiResponseText.trim() });
                saveCurrentChat();

                bubble.innerHTML = DOMPurify.sanitize(marked.parse(aiResponseText.trim()));
                chat.scrollTop = chat.scrollHeight;

                // Only generate title if it's the very first interaction and we used a placeholder
                if (conversationHistory.length === 2) {
                    generateTitle(text);
                }

            } catch (error) {
                bubble.textContent = "Connection lost.";
                bubble.classList.add('text-red-500');
                bubble.classList.remove('cursor-blink');
                console.error(error);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(e);
                reader.readAsText(file);
            });
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
