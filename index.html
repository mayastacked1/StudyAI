<script>
    // State management
    let chatHistory = JSON.parse(localStorage.getItem('studyAI_chatHistory')) || [];

    // Render logic
    function renderChat() {
        const chatBox = document.getElementById('messages');
        chatBox.innerHTML = chatHistory.map(msg => `
            <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                <div class="${msg.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-200 dark:bg-slate-700'} px-5 py-3 rounded-2xl shadow-sm max-w-[85%]">
                    ${msg.content}
                </div>
            </div>
        `).join('');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Send logic
    async function handleSend() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const prompt = input.value.trim();
        if (!prompt) return;

        // Add user message to state
        chatHistory.push({ role: 'user', content: prompt });
        renderChat();
        input.value = '';
        btn.disabled = true;

        try {
            const res = await fetch('/api/chat', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ prompt, history: chatHistory.slice(0, -1) })
            });
            const data = await res.json();
            
            // Add AI response to state
            chatHistory.push({ role: 'assistant', content: data.reply });
            localStorage.setItem('studyAI_chatHistory', JSON.stringify(chatHistory));
            renderChat();
        } catch (err) {
            alert("Error: Unable to connect to StudyAI.");
        } finally {
            btn.disabled = false;
            input.focus();
        }
    }

    // UI Utilities
    function toggleSettings() { document.getElementById('settings-modal').classList.toggle('hidden'); }
    
    function createNewChat() {
        chatHistory = [];
        localStorage.removeItem('studyAI_chatHistory');
        renderChat();
        if (window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
    }

    // Initialize
    window.onload = renderChat;
    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
</script>
