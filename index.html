<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAI | Pro Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { bg: '#09090b', surface: '#18181b', border: '#27272a' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards', // Professional spring physics
                        'pop-in': 'popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards', // For sending animation
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        popIn: { '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' }, '100%': { opacity: '1', transform: 'scale(1) translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #3f3f46; }
        
        /* Cursor blinking animation */
        .cursor-blink::after {
            content: '▋';
            display: inline-block;
            margin-left: 2px;
            animation: blink 1s step-start infinite;
            color: #3b82f6;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Ensure header doesn't hide content */
        .chat-container {
            scroll-margin-top: 5rem; 
        }
    </style>
</head>
<body class="h-full bg-zinc-50 dark:bg-dark-bg text-zinc-900 dark:text-zinc-100 transition-colors duration-300 selection:bg-primary-500 selection:text-white">

    <div class="flex h-full overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 bg-white/80 dark:bg-dark-surface/80 backdrop-blur-md border-r border-zinc-200 dark:border-dark-border flex flex-col z-30 absolute md:relative h-full transition-transform duration-300 -translate-x-full md:translate-x-0">
            <div class="p-6 pb-2">
                <button onclick="createNewChat()" class="group w-full bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 font-medium py-3 rounded-xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all duration-300 flex items-center justify-center gap-2">
                    <span class="text-xl group-hover:rotate-90 transition-transform duration-300">+</span> New Chat
                </button>
            </div>
            <div class="px-4 py-2 text-xs font-semibold text-zinc-400 uppercase tracking-wider">History</div>
            <div id="history-list" class="flex-1 overflow-y-auto px-3 space-y-1 py-2">
                <!-- History items injected here -->
            </div>
            
            <div class="p-4 border-t border-zinc-200 dark:border-dark-border">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full px-4 py-3 rounded-xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all text-sm font-medium text-zinc-600 dark:text-zinc-300">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary-500 to-purple-500 flex items-center justify-center text-white text-xs">AI</div>
                    <span>Study Assistant</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative w-full bg-white dark:bg-dark-bg">
            <header class="absolute top-0 left-0 right-0 p-4 z-20 bg-white/70 dark:bg-dark-bg/70 backdrop-blur-sm border-b border-zinc-200/50 dark:border-dark-border/50 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 text-zinc-500 hover:text-zinc-800 dark:hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-black dark:bg-white rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white dark:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                        </div>
                        <h1 class="font-semibold tracking-tight text-lg">StudyAI <span class="text-primary-600 dark:text-primary-500">Pro</span></h1>
                    </div>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors">
                    <svg class="w-5 h-5 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg class="w-5 h-5 block dark:hidden text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </header>
            
            <!-- Chat Container: Added pb-32 for spacing above input -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-8 pt-28 pb-32 space-y-6 max-w-4xl mx-auto w-full scroll-smooth chat-container">
                <!-- Welcome State -->
                <div id="welcome-state" class="flex flex-col items-center justify-center mt-10 opacity-60 select-none">
                    <div class="w-16 h-16 bg-zinc-100 dark:bg-zinc-800 rounded-2xl flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <p class="text-sm font-medium text-zinc-400">Start a new conversation</p>
                </div>
            </div>

            <!-- Input Area: Fixed at bottom relative to main -->
            <div class="p-4 md:p-8 max-w-4xl mx-auto w-full z-10">
                <div class="relative bg-white dark:bg-zinc-900 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] dark:shadow-[0_8px_30px_rgb(0,0,0,0.4)] border border-zinc-200 dark:border-zinc-700 focus-within:ring-2 ring-primary-500/50 transition-all duration-300 group">
                    <textarea id="user-input" rows="1" placeholder="Ask anything about your studies..." 
                        class="w-full bg-transparent px-5 py-4 outline-none resize-none max-h-48 text-zinc-800 dark:text-zinc-100 placeholder-zinc-400 scrollbar-hide"
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    
                    <div class="flex items-center justify-between px-3 pb-3 pt-1">
                        <button class="p-2 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        </button>
                        <button id="send-btn" onclick="handleSend()" class="p-2.5 bg-black dark:bg-white text-white dark:text-black rounded-xl hover:opacity-90 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        let conversationHistory = [];
        let currentChatId = Date.now().toString(); // Unique ID for current session
        const chats = JSON.parse(localStorage.getItem('studyai_chats')) || {};

        // Load the last active chat if exists
        if (Object.keys(chats).length > 0) {
            const lastId = Object.keys(chats)[Object.keys(chats).length - 1];
            loadChat(lastId);
        }

        function saveCurrentChat() {
            if (conversationHistory.length === 0) return;
            chats[currentChatId] = {
                id: currentChatId,
                title: conversationHistory[0]?.content.substring(0, 30) + "..." || "New Chat",
                history: conversationHistory,
                timestamp: Date.now()
            };
            localStorage.setItem('studyai_chats', JSON.stringify(chats));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            // Sort by timestamp descending
            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-lg text-sm transition-colors truncate border ${
                    chat.id === currentChatId 
                    ? 'bg-zinc-200 dark:bg-zinc-800 text-zinc-900 dark:text-white border-zinc-300 dark:border-zinc-700 font-medium' 
                    : 'text-zinc-600 dark:text-zinc-400 hover:bg-zinc-100 dark:hover:bg-zinc-800 border-transparent'
                }`;
                btn.textContent = chat.title;
                btn.onclick = () => loadChat(chat.id);
                list.appendChild(btn);
            });
        }

        function loadChat(id) {
            currentChatId = id;
            conversationHistory = chats[id].history || [];
            
            // Re-render messages
            const chatContainer = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';
            
            // Clear current view (keep welcome hidden or remove it)
            chatContainer.innerHTML = ''; 
            
            conversationHistory.forEach(msg => {
                createMessageElement(msg.role, msg.content, false);
            });
            
            renderHistoryList();
            
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            }
        }

        function createNewChat() { 
            currentChatId = Date.now().toString();
            conversationHistory = [];
            const chatContainer = document.getElementById('messages');
            chatContainer.innerHTML = `
                <div id="welcome-state" class="flex flex-col items-center justify-center mt-10 opacity-60 select-none">
                    <div class="w-16 h-16 bg-zinc-100 dark:bg-zinc-800 rounded-2xl flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <p class="text-sm font-medium text-zinc-400">Start a new conversation</p>
                </div>`;
            
            // Update Sidebar active state
            renderHistoryList();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            if (isHidden) sidebar.classList.remove('-translate-x-full');
            else sidebar.classList.add('-translate-x-full');
        }

        // --- CHAT LOGIC ---
        
        function createMessageElement(role, text = '', isStreaming = false) {
            const chat = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';

            const wrapper = document.createElement('div');
            // Fix 3: Use 'pop-in' animation for user messages, 'slide-up' for AI
            const animClass = role === 'user' ? 'animate-pop-in' : 'animate-slide-up';
            
            wrapper.className = `flex gap-4 ${animClass} ${role === 'user' ? 'flex-row-reverse' : 'flex-row'}`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center text-white shadow-sm ${role === 'user' ? 'bg-black dark:bg-zinc-700' : 'bg-primary-600'}`;
            avatar.innerHTML = role === 'user' 
                ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'
                : '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>';

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] leading-relaxed text-[15px] px-5 py-3 rounded-2xl shadow-sm break-words overflow-hidden ${
                role === 'user' 
                ? 'bg-zinc-100 dark:bg-zinc-800 text-zinc-800 dark:text-zinc-200 rounded-tr-sm' 
                : 'text-zinc-700 dark:text-zinc-300 bg-white dark:bg-zinc-800/50 border border-zinc-100 dark:border-zinc-700/50 rounded-tl-sm ' + (isStreaming ? 'cursor-blink' : '')
            }`;
            
            if (!isStreaming) bubble.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chat.appendChild(wrapper);
            
            // Fix 2: Smooth scroll with delay to allow animation to start
            setTimeout(() => {
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            }, 50);
            
            return { wrapper, bubble };
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            if (!text) return;

            // 1. Add User Message to UI
            createMessageElement('user', text);
            
            // 2. Update State
            conversationHistory.push({ role: 'user', content: text });
            saveCurrentChat(); // Save immediately

            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;

            // 3. Create Placeholder for AI Message
            const { bubble } = createMessageElement('assistant', '', true);
            let aiResponseText = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, history: conversationHistory })
                });

                if (!response.ok) throw new Error("Server error");

                // 4. Read Stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    aiResponseText += data.content;
                                    bubble.textContent = aiResponseText;
                                    
                                    const chat = document.getElementById('messages');
                                    chat.scrollTop = chat.scrollHeight;
                                }
                            } catch (e) { /* ignore parse errors on chunks */ }
                        }
                    }
                }

                // 5. Finalize
                bubble.classList.remove('cursor-blink');
                conversationHistory.push({ role: 'assistant', content: aiResponseText });
                saveCurrentChat(); // Save final response

            } catch (error) {
                bubble.textContent = "Error: Could not connect to server.";
                bubble.classList.add('text-red-500');
                bubble.classList.remove('cursor-blink');
                console.error(error);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
