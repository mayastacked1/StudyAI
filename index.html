<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyAI | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        dark: { bg: '#0f172a', surface: '#1e293b', border: '#334155' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-in-left': 'slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        pulseGlow: { '0%, 100%': { opacity: 1, boxShadow: '0 0 20px rgba(59, 130, 246, 0.5)' }, '50%': { opacity: .5, boxShadow: '0 0 10px rgba(59, 130, 246, 0.2)' } },
                        slideInRight: { '0%': { opacity: 0, transform: 'translateX(20px) scale(0.95)' }, '100%': { opacity: 1, transform: 'translateX(0) scale(1)' } },
                        slideInLeft: { '0%': { opacity: 0, transform: 'translateX(-20px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } },
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

        /* Streaming Cursor */
        .cursor-blink::after {
            content: '▋';
            display: inline-block;
            margin-left: 2px;
            animation: blink 1s step-start infinite;
            color: #3b82f6;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }

        /* Mobile Input Safe Area */
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body class="h-full bg-slate-50 dark:bg-dark-bg text-slate-900 dark:text-slate-100 transition-colors duration-500 selection:bg-brand-500 selection:text-white overflow-hidden">

    <div class="flex h-full w-full relative">
        
        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/20 dark:bg-black/50 backdrop-blur-sm z-20 hidden md:hidden transition-opacity opacity-0"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="absolute md:relative z-30 h-full w-80 bg-white dark:bg-dark-surface border-r border-slate-200 dark:border-dark-border transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-out flex flex-col shadow-2xl md:shadow-none">
            <div class="p-6 pb-2">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-xl bg-slate-900 dark:bg-white flex items-center justify-center text-white dark:text-slate-900 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    </div>
                    <h1 class="text-2xl font-bold tracking-tight">StudyAI</h1>
                </div>

                <button onclick="createNewChat()" class="group w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-semibold py-3.5 rounded-2xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all duration-300 flex items-center justify-center gap-2 active:scale-95">
                    <span class="text-xl group-hover:rotate-90 transition-transform duration-300">+</span> New Chat
                </button>
            </div>

            <div class="px-4 py-2 text-xs font-bold text-slate-400 uppercase tracking-wider">History</div>
            
            <!-- History List Container (Fixed scrolling) -->
            <div id="history-list" class="flex-1 overflow-y-auto px-3 space-y-1 pb-4">
                <!-- History items injected here -->
            </div>
            
            <div class="p-4 border-t border-slate-200 dark:border-dark-border">
                <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer">
                    <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-brand-500 to-purple-500 flex items-center justify-center text-white text-xs font-bold">AI</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium truncate">Aiserie</p>
                        <p class="text-xs text-slate-500 truncate">Online</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col relative w-full h-full bg-white dark:bg-dark-bg">
            
            <!-- Header -->
            <header class="absolute top-0 left-0 right-0 h-16 z-20 glass border-b border-slate-200/50 dark:border-dark-border/50 flex items-center justify-between px-4">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 -ml-2 text-slate-500 hover:text-slate-900 dark:hover:text-white active:scale-95 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-slate-900 dark:bg-white rounded-lg flex items-center justify-center shadow-md">
                            <svg class="w-5 h-5 text-white dark:text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                        </div>
                        <span class="font-semibold tracking-tight text-lg">StudyAI</span>
                    </div>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-90">
                    <svg class="w-5 h-5 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg class="w-5 h-5 block dark:hidden text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </header>
            
            <!-- Chat Container -->
            <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-8 pt-24 pb-32 space-y-6 max-w-4xl mx-auto w-full scroll-smooth">
                <!-- Welcome State -->
                <div id="welcome-state" class="flex flex-col items-center justify-center h-[60vh] opacity-60 select-none">
                    <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-3xl flex items-center justify-center mb-6 shadow-xl animate-float">
                        <svg class="w-10 h-10 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">Welcome to StudyAI</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs text-center">I'm <span class="font-semibold text-brand-500">Aiserie</span>. How can I help you study today?</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 p-4 md:p-8 max-w-4xl mx-auto w-full z-10 bg-gradient-to-t from-white via-white to-transparent dark:from-dark-bg dark:via-dark-bg pb-safe">
                <div class="relative bg-white dark:bg-slate-900 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] dark:shadow-[0_8px_40px_rgb(0,0,0,0.6)] border border-slate-200 dark:border-slate-700 focus-within:ring-2 focus-within:ring-brand-500/50 focus-within:shadow-brand-500/20 transition-all duration-300 group">
                    <textarea id="user-input" rows="1" placeholder="Ask Aiserie..." 
                        class="w-full bg-transparent px-6 py-4 outline-none resize-none max-h-48 text-slate-800 dark:text-slate-100 placeholder-slate-400 scrollbar-hide text-[16px]"
                        oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'"></textarea>
                    
                    <div class="flex items-center justify-between px-2 pb-2 pt-1">
                        <button class="p-2.5 text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 transition-colors rounded-full hover:bg-slate-50 dark:hover:bg-slate-800">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                        </button>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-brand-600 hover:bg-brand-500 text-white rounded-2xl shadow-lg shadow-brand-500/30 transition-all duration-300 transform active:scale-90 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
                            <svg class="w-5 h-5 translate-x-[-1px] translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
                <div class="text-center mt-3 pb-2">
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">StudyAI powered by Aiserie Engine</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        let conversationHistory = [];
        let currentChatId = Date.now().toString();
        const chats = JSON.parse(localStorage.getItem('studyai_chats')) || {};

        if (Object.keys(chats).length > 0) {
            const lastId = Object.keys(chats)[Object.keys(chats).length - 1];
            loadChat(lastId);
        } else {
            renderHistoryList();
        }

        function saveCurrentChat() {
            if (conversationHistory.length === 0) return;
            chats[currentChatId] = {
                id: currentChatId,
                title: chats[currentChatId]?.title || "New Chat", // Preserve title if exists
                history: conversationHistory,
                timestamp: Date.now()
            };
            localStorage.setItem('studyai_chats', JSON.stringify(chats));
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const itemContainer = document.createElement('div');
                itemContainer.className = "group flex items-center justify-between gap-1";
                
                // The Clickable Chat Title
                const btn = document.createElement('button');
                const isActive = chat.id === currentChatId;
                btn.className = `flex-1 text-left px-4 py-3 rounded-xl text-sm transition-all duration-200 truncate border ${
                    isActive 
                    ? 'bg-brand-50 dark:bg-brand-900/20 text-brand-700 dark:text-brand-300 border-brand-100 dark:border-brand-800/50 font-semibold shadow-sm' 
                    : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 border-transparent hover:border-slate-100 dark:hover:border-slate-700'
                }`;
                btn.textContent = chat.title;
                btn.onclick = () => loadChat(chat.id);

                // The Delete Button
                const delBtn = document.createElement('button');
                delBtn.className = `p-2 rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors opacity-100 md:opacity-0 md:group-hover:opacity-100`;
                delBtn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>`;
                delBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevent loading the chat when deleting
                    deleteChat(chat.id);
                };

                itemContainer.appendChild(btn);
                itemContainer.appendChild(delBtn);
                list.appendChild(itemContainer);
            });
        }

        function deleteChat(id) {
            if(confirm('Delete this conversation?')) {
                delete chats[id];
                localStorage.setItem('studyai_chats', JSON.stringify(chats));
                
                // If we deleted the current chat, start a new one
                if (id === currentChatId) {
                    createNewChat();
                } else {
                    renderHistoryList();
                }
            }
        }

        async function generateTitle(firstPrompt) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        prompt: `Generate a very short, 3-5 word title for this user request: "${firstPrompt}". Do not include quotes. Just the title.`,
                        history: [] 
                    })
                });
                const data = await response.json();
                if (data.reply) {
                    const cleanTitle = data.reply.replace(/['"]/g, '').trim();
                    if(chats[currentChatId]) {
                        chats[currentChatId].title = cleanTitle;
                        localStorage.setItem('studyai_chats', JSON.stringify(chats));
                        renderHistoryList();
                    }
                }
            } catch (e) {
                console.log("Could not generate title", e);
            }
        }

        function loadChat(id) {
            currentChatId = id;
            conversationHistory = chats[id].history || [];
            const chatContainer = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';
            
            chatContainer.innerHTML = ''; 
            
            conversationHistory.forEach(msg => {
                createMessageElement(msg.role, msg.content, false);
            });
            
            renderHistoryList();
            
            // SCROLL FIX: Ensure we scroll to bottom after loading
            requestAnimationFrame(() => {
                 chatContainer.scrollTop = chatContainer.scrollHeight;
            });

            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function createNewChat() { 
            currentChatId = Date.now().toString();
            conversationHistory = [];
            const chatContainer = document.getElementById('messages');
            chatContainer.innerHTML = `
                <div id="welcome-state" class="flex flex-col items-center justify-center h-[60vh] opacity-60 select-none">
                    <div class="w-20 h-20 bg-slate-100 dark:bg-slate-800 rounded-3xl flex items-center justify-center mb-6 shadow-xl animate-float">
                        <svg class="w-10 h-10 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">Welcome to StudyAI</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 max-w-xs text-center">I'm <span class="font-semibold text-brand-500">Aiserie</span>. How can I help you study today?</p>
                </div>`;
            renderHistoryList();
            if (window.innerWidth < 768) toggleSidebar(false);
        }

        function toggleSidebar(forceState) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isHidden = sidebar.classList.contains('-translate-x-full');
            const shouldShow = forceState !== undefined ? forceState : isHidden;

            if (shouldShow) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                document.body.style.overflow = 'hidden';
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
                document.body.style.overflow = '';
            }
        }

        function createMessageElement(role, text = '', isStreaming = false) {
            const chat = document.getElementById('messages');
            const welcome = document.getElementById('welcome-state');
            if(welcome) welcome.style.display = 'none';

            const wrapper = document.createElement('div');
            const animClass = role === 'user' ? 'animate-slide-in-right' : 'animate-slide-in-left';
            
            wrapper.className = `flex gap-4 ${animClass} ${role === 'user' ? 'flex-row-reverse' : 'flex-row'} items-start`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center text-white shadow-md ${
                role === 'user' 
                ? 'bg-slate-800 dark:bg-slate-600' 
                : 'bg-gradient-to-br from-brand-500 to-purple-600 shadow-brand-500/30'
            }`;
            avatar.innerHTML = role === 'user' 
                ? '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'
                : '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>';

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] leading-relaxed text-[15px] px-5 py-3.5 rounded-3xl shadow-sm break-words overflow-hidden ${
                role === 'user' 
                ? 'bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-tr-md' 
                : 'text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-tl-md ' + (isStreaming ? 'cursor-blink' : '')
            }`;
            
            if (!isStreaming) bubble.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chat.appendChild(wrapper);
            
            requestAnimationFrame(() => {
                chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
            });
            
            return { wrapper, bubble };
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            if (!text) return;

            // Initialize chat entry if new
            if (!chats[currentChatId]) {
                chats[currentChatId] = { id: currentChatId, title: text.substring(0, 30) + "...", history: [], timestamp: Date.now() };
                renderHistoryList();
            }

            createMessageElement('user', text);
            conversationHistory.push({ role: 'user', content: text });
            saveCurrentChat();

            input.value = '';
            input.style.height = 'auto';
            btn.disabled = true;

            const { bubble } = createMessageElement('assistant', '', true);
            let aiResponseText = '';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, history: conversationHistory })
                });

                if (!response.ok) throw new Error("Server error");

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') break;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.content) {
                                    aiResponseText += data.content;
                                    bubble.textContent = aiResponseText;
                                    const chat = document.getElementById('messages');
                                    chat.scrollTop = chat.scrollHeight;
                                }
                            } catch (e) { /* ignore */ }
                        }
                    }
                }

                bubble.classList.remove('cursor-blink');
                conversationHistory.push({ role: 'assistant', content: aiResponseText });
                saveCurrentChat();

                // Generate Title if it's the first message (and currently has a truncated title)
                if (conversationHistory.length === 2 && chats[currentChatId].title.includes("...")) {
                    generateTitle(text);
                }

            } catch (error) {
                bubble.textContent = "Connection lost.";
                bubble.classList.add('text-red-500');
                bubble.classList.remove('cursor-blink');
                console.error(error);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });
    </script>
</body>
</html>
