<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAI | Gemini Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-bubble { max-width: 85%; }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8f9fa] h-screen flex flex-col items-center">

    <header class="w-full p-4 flex items-center justify-between max-w-3xl">
        <h1 class="text-xl font-semibold text-gray-700">StudyAI</h1>
    </header>

    <div id="messages" class="flex-1 w-full max-w-3xl overflow-y-auto p-4 space-y-6">
        </div>

    <div class="w-full max-w-3xl p-4">
        <div class="relative bg-white rounded-2xl shadow-sm border border-gray-200">
            <input id="user-input" type="text" placeholder="Ask a study question..." 
                class="w-full px-6 py-4 rounded-2xl focus:outline-none bg-transparent">
            <button id="send-btn" class="absolute right-3 top-3 p-2 text-gray-400 hover:text-indigo-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
        <p class="text-[10px] text-center text-gray-400 mt-3">StudyAI may display inaccurate info. Your privacy matters.</p>
    </div>

    <script>
        const chatBox = document.getElementById('messages');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="message-bubble px-4 py-3 rounded-2xl ${isUser ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-200 text-gray-800'}">
                    ${text}
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, true);
            input.value = '';

            const loadingId = 'loading-' + Date.now();
            chatBox.innerHTML += `<div id="${loadingId}" class="text-sm text-gray-400 italic">Thinking...</div>`;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                document.getElementById(loadingId)?.remove();
                addMessage(data.reply || data.error, false);
            } catch (err) {
                document.getElementById(loadingId)?.remove();
                addMessage("Server Error", false);
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
